services:
  # Python Backend (Django)
  - type: web
    name: english-gemini-backend
    env: python
    buildCommand: "cd django_backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd django_backend && gunicorn core.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: USE_POSTGRES
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: english-gemini-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*" # Update this with your actual Render URL later
      - key: CORS_ALLOWED_ORIGINS
        value: "https://english-gemini-frontend.onrender.com" # Update with frontend URL

  # Static Site (React/Vite)
  - type: web
    name: english-gemini-frontend
    env: static
    buildCommand: "cd frontend_react && npm install && npm run build"
    staticPublishPath: "frontend_react/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://english-gemini-backend.onrender.com/api/"

databases:
  - name: english-gemini-db
    plan: free
